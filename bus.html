<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bus Tickets</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.navbar{
background:#111;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
}

.title{
text-align:center;
margin:40px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
}

button{
background:#ff9900;
border:none;
padding:10px 18px;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="navbar">
<div>🌍 TravelGo</div>
</div>

<h2 class="title">🚌 Available Buses</h2>

<div class="container">

<div class="card">
<div>
<h3>Express Bus</h3>
<p>Departure: 06:00 AM</p>
<p>Seats Available: 20</p>
</div>
<div>
<p><b>₹550</b></p>
<button onclick="book()">Book Ticket</button>
</div>
</div>

<div class="card">
<div>
<h3>Luxury Sleeper</h3>
<p>Departure: 10:30 PM</p>
<p>Seats Available: 15</p>
</div>
<div>
<p><b>₹850</b></p>
<button onclick="book()">Book Ticket</button>
</div>
</div>

</div>

<script>
function book(){
window.location.href="payment.html";
}
</script>

</body>
</html>
